<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ProFlow Dashboard — Client Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--card:rgba(255,255,255,.02);--border:rgba(255,255,255,.05);--text:#f7f5f0;--muted:rgba(255,255,255,.35);--gold:#c9a84c;--green:#22c55e;--purple:#6366f1;--red:#ef4444;--sans:'Outfit',system-ui,sans-serif;--serif:'Instrument Serif',Georgia,serif}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex}
a{color:inherit;text-decoration:none}
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0}
.sb-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);font-family:var(--serif);font-size:22px}
.sb-logo span{color:var(--gold)}
.sb-plan{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:2px;font-family:var(--sans)}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;cursor:pointer;margin-bottom:2px;color:var(--muted);font-size:14px;transition:all .15s}
.sb-item:hover{background:rgba(255,255,255,.03);color:var(--text)}
.sb-item.active{background:rgba(201,168,76,.1);color:var(--gold);font-weight:600}
.sb-item i{font-size:16px;width:20px;text-align:center;font-style:normal}
.sb-user{padding:16px;border-top:1px solid var(--border)}
.sb-avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--gold),#8b6914);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.sb-logout{width:100%;padding:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;margin-top:12px}
.main{margin-left:220px;flex:1;padding:28px 32px;overflow-y:auto;min-height:100vh}
.panel{display:none}.panel.active{display:block}
.stats{display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 22px;flex:1;min-width:180px}
.stat-label{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:10px}
.stat-val{font-size:32px;font-weight:700;line-height:1}
.stat-sub{font-size:12px;margin-top:6px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:14px;text-transform:uppercase;letter-spacing:.08em}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.row:last-child{border-bottom:none}
.badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px}
.btn{padding:10px 20px;background:linear-gradient(135deg,var(--gold),#b8963f);border:none;border-radius:10px;color:var(--bg);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-outline{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);color:var(--gold)}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red)}
h1{font-size:24px;font-weight:600;margin-bottom:4px}
h2{font-size:20px;font-weight:600;margin-bottom:24px}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.error-msg{text-align:center;padding:40px;color:var(--red);font-size:14px}
.empty-msg{text-align:center;padding:40px;color:var(--muted);font-size:14px;line-height:1.6}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:#15151f;border:1px solid var(--border);border-radius:16px;padding:28px;max-width:480px;width:90%;position:relative}
.modal h3{font-size:18px;font-weight:600;margin-bottom:18px}
.modal label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;margin-top:14px;text-transform:uppercase;letter-spacing:.08em}
.modal input,.modal textarea,.modal select{width:100%;padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;resize:vertical}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:rgba(201,168,76,.4)}
.modal select option{background:#15151f;color:var(--text)}
.modal .btn{margin-top:18px;width:100%}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
.success-msg{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:16px;text-align:center;color:var(--green);font-size:14px}
.tbl-header{display:grid;padding:12px 20px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:600;border-bottom:1px solid var(--border)}
.tbl-row{display:grid;padding:14px 20px;align-items:center;border-bottom:1px solid rgba(255,255,255,.03)}
.tbl-row:last-child{border-bottom:none}
/* Settings */
.setting-group{margin-bottom:12px}
.setting-group label{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,.6);cursor:pointer;padding:4px 0}
.setting-group input[type="checkbox"]{accent-color:var(--gold);width:16px;height:16px}
@media(max-width:768px){.sidebar{width:60px}.sb-logo span,.sb-plan,.sb-item span,.sb-user>div:last-child{display:none}.main{margin-left:60px}.stats,.grid2,.grid3,.grid4{grid-template-columns:1fr;display:flex;flex-direction:column}}
</style>
</head>
<body>
<script>
(async function(){
  var token=localStorage.getItem('pf_token');
  if(!token){window.location.href='/login/';return;}
  try{
    var res=await fetch('/.netlify/functions/verify-token',{headers:{'Authorization':'Bearer '+token}});
    if(!res.ok){localStorage.removeItem('pf_token');localStorage.removeItem('pf_user');window.location.href='/login/';return;}
    var data=await res.json();
    window._authUser=data;
    localStorage.setItem('pf_user',JSON.stringify(data));
  }catch(e){localStorage.removeItem('pf_token');localStorage.removeItem('pf_user');window.location.href='/login/';return;}
})();
var u=JSON.parse(localStorage.getItem('pf_user')||'{}');
</script>

<div class="sidebar">
<div class="sb-logo">Pro<span>Flow</span><div class="sb-plan" id="sb-plan"></div></div>
<div class="sb-nav">
<div class="sb-item active" data-panel="dash" onclick="showPanel('dash',this)"><i>&#9673;</i><span>Dashboard</span></div>
<div class="sb-item" data-panel="content" onclick="showPanel('content',this)"><i>&#9998;</i><span>Content</span></div>
<div class="sb-item" data-panel="social" onclick="showPanel('social',this)"><i>&#9672;</i><span>Social</span></div>
<div class="sb-item" data-panel="analytics" onclick="showPanel('analytics',this)"><i>&#9674;</i><span>Analytics</span></div>
<div class="sb-item" data-panel="voice" onclick="showPanel('voice',this)"><i>&#9742;</i><span>Voice AI</span></div>
<div class="sb-item" data-panel="media" onclick="showPanel('media',this)"><i>&#9654;</i><span>Media</span></div>
<div class="sb-item" data-panel="leads" onclick="showPanel('leads',this)"><i>&#9678;</i><span>Leads</span></div>
<div class="sb-item" data-panel="settings" onclick="showPanel('settings',this)"><i>&#9881;</i><span>Settings</span></div>
</div>
<div class="sb-user">
<div style="display:flex;align-items:center;gap:10px">
<div class="sb-avatar" id="sb-avatar"></div>
<div><div style="font-size:13px;font-weight:500" id="sb-name"></div><div style="font-size:11px;color:var(--muted)" id="sb-email"></div></div>
</div>
<button class="sb-logout" onclick="localStorage.removeItem('pf_token');localStorage.removeItem('pf_user');window.location.href='/login/'">Sign Out</button>
</div>
</div>

<div class="main">
<!-- DASHBOARD -->
<div class="panel active" id="p-dash"><div class="loading">Loading dashboard...</div></div>
<!-- CONTENT -->
<div class="panel" id="p-content"><div class="loading">Loading content...</div></div>
<!-- SOCIAL -->
<div class="panel" id="p-social"><div class="loading">Loading social data...</div></div>
<!-- ANALYTICS -->
<div class="panel" id="p-analytics"><div class="loading">Loading analytics...</div></div>
<!-- VOICE AI -->
<div class="panel" id="p-voice"><div class="loading">Loading voice data...</div></div>
<!-- MEDIA -->
<div class="panel" id="p-media"></div>
<!-- LEADS -->
<div class="panel" id="p-leads"><div class="loading">Loading leads...</div></div>
<!-- SETTINGS -->
<div class="panel" id="p-settings"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
<div class="modal" id="modal-body"></div>
</div>

<script>
var token=localStorage.getItem('pf_token');
var API='/.netlify/functions/client-api';
var loaded={};
var name=u.name||'User';
var displayName=name.split(/[._@]/)[0];
displayName=displayName.charAt(0).toUpperCase()+displayName.slice(1);

// Sidebar user info
document.getElementById('sb-plan').textContent=(u.plan==='agency'?'Agency':u.plan==='growth'?'Growth':'Starter')+' Plan';
document.getElementById('sb-avatar').textContent=(name[0]||'U').toUpperCase();
document.getElementById('sb-name').textContent=name.split(/[._]/).map(function(w){return w.charAt(0).toUpperCase()+w.slice(1)}).join(' ');
document.getElementById('sb-email').textContent=(u.email||'').slice(0,22);

// API helper
async function apiFetch(action){
  var res=await fetch(API+'?action='+action,{headers:{'Authorization':'Bearer '+token}});
  if(!res.ok) throw new Error('API error '+res.status);
  return res.json();
}

// Panel switching with lazy loading
function showPanel(id,el){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.getElementById('p-'+id).classList.add('active');
  document.querySelectorAll('.sb-item').forEach(function(i){i.classList.remove('active')});
  if(el) el.classList.add('active');
  if(!loaded[id]){loaded[id]=true;loaders[id]();}
}

// Modal helpers
function openModal(html){
  document.getElementById('modal-body').innerHTML='<button class="modal-close" onclick="closeModal()">&times;</button>'+html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function showModalSuccess(msg){
  document.getElementById('modal-body').innerHTML='<div class="success-msg">'+msg+'</div>';
  setTimeout(closeModal,2500);
}

// Badge helper
function statusBadge(status){
  var s=String(status||'').toLowerCase();
  if(s==='published'||s==='active'||s==='completed') return 'background:rgba(34,197,94,.1);color:var(--green)';
  if(s==='scheduled'||s==='warm'||s==='pending') return 'background:rgba(201,168,76,.1);color:var(--gold)';
  if(s==='hot') return 'background:rgba(239,68,68,.1);color:var(--red)';
  return 'background:rgba(255,255,255,.05);color:var(--muted)';
}

// ========== PANEL LOADERS ==========

var loaders={};

// DASHBOARD
loaders.dash=async function(){
  var el=document.getElementById('p-dash');
  try{
    var data=await apiFetch('dashboard');
    var html='<h1>Welcome back, '+displayName+'</h1>';
    html+='<p style="font-size:14px;color:var(--muted);margin-bottom:24px">Your content engine is running. Here\'s today\'s snapshot.</p>';
    html+='<div class="stats">';
    html+='<div class="stat"><div class="stat-label">Content Published</div><div class="stat-val" style="color:var(--gold)">'+(data.contentCount||0)+'</div><div class="stat-sub" style="color:var(--green)">published pieces</div></div>';
    html+='<div class="stat"><div class="stat-label">Social Posts</div><div class="stat-val" style="color:var(--green)">'+(data.socialCount||0)+'</div><div class="stat-sub" style="color:var(--green)">posts distributed</div></div>';
    html+='<div class="stat"><div class="stat-label">Leads Generated</div><div class="stat-val" style="color:var(--purple)">'+(data.leadCount||0)+'</div><div class="stat-sub" style="color:var(--green)">leads captured</div></div>';
    html+='<div class="stat"><div class="stat-label">Voice Calls</div><div class="stat-val" style="color:var(--red)">'+(data.voiceCalls||0)+'</div><div class="stat-sub" style="color:var(--green)">AI calls handled</div></div>';
    html+='</div>';
    // Analytics mini chart
    html+='<div class="grid2">';
    html+='<div class="card"><div class="card-title">Recent Analytics</div>';
    if(data.analytics&&data.analytics.length){
      var mx=Math.max.apply(null,data.analytics.map(function(a){return a.views||0}));
      html+='<div style="display:flex;align-items:flex-end;gap:6px;height:100px">';
      data.analytics.slice(-7).forEach(function(a){
        var h=mx>0?Math.round((a.views||0)/mx*90):4;
        html+='<div style="flex:1;text-align:center"><div style="height:'+h+'px;background:linear-gradient(180deg,rgba(201,168,76,.8),rgba(201,168,76,.2));border-radius:4px 4px 0 0;min-height:4px"></div><div style="font-size:9px;color:var(--muted);margin-top:4px">'+(a.date||'').slice(-5)+'</div></div>';
      });
      html+='</div>';
    } else {
      html+='<div style="color:var(--muted);font-size:13px">Analytics data will appear as traffic arrives.</div>';
    }
    html+='</div>';
    // System status
    html+='<div class="card"><div class="card-title">System Status</div>';
    var systems=[['Content Engine','Running'],['Social Scheduler','Running'],['Voice AI (631-892-9817)','Live'],['Lead Pipeline','Active'],['Watchdog','Monitoring']];
    systems.forEach(function(s){
      html+='<div class="row"><span style="font-size:13px;color:rgba(255,255,255,.6)">'+s[0]+'</span><span style="font-size:11px;color:var(--green);font-weight:600"><span class="dot" style="background:var(--green)"></span>'+s[1]+'</span></div>';
    });
    html+='</div></div>';
    el.innerHTML=html;
  }catch(e){
    el.innerHTML='<h1>Welcome back, '+displayName+'</h1><p style="font-size:14px;color:var(--muted);margin-bottom:24px">Your content engine is running.</p><div class="error-msg">Unable to load dashboard data. Please try refreshing.</div>';
  }
};

// CONTENT
loaders.content=async function(){
  var el=document.getElementById('p-content');
  try{
    var data=await apiFetch('content');
    var items=data.items||[];
    var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px"><h2 style="margin:0">Content Pipeline</h2><button class="btn" onclick="openNewContentModal()">+ New Content</button></div>';
    if(items.length){
      html+='<div class="card" style="padding:0;overflow:hidden">';
      items.forEach(function(it){
        html+='<div class="row" style="padding:16px 20px"><div style="flex:1"><div style="font-size:14px;font-weight:500">'+(it.title||'Untitled')+'</div><div style="font-size:12px;color:var(--muted);margin-top:3px">'+(it.type||'Content')+' &middot; '+(it.words?it.words+' words &middot; ':'')+(it.date||'')+'</div></div><span class="badge" style="'+statusBadge(it.status)+'">'+(it.status||'Draft')+'</span></div>';
      });
      html+='</div>';
    } else {
      html+='<div class="empty-msg">No content yet. Click "+ New Content" to request your first piece.</div>';
    }
    el.innerHTML=html;
  }catch(e){
    el.innerHTML='<h2>Content Pipeline</h2><div class="error-msg">Unable to load content. Please try again later.</div>';
  }
};

// SOCIAL
loaders.social=async function(){
  var el=document.getElementById('p-social');
  try{
    var data=await apiFetch('social');
    var posts=data.posts||[];
    var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px"><h2 style="margin:0">Social Media Command</h2><button class="btn" onclick="openCreatePostModal()">Create Post</button></div>';
    if(posts.length){
      html+='<div class="grid3">';
      // Group by platform
      var platforms={};
      posts.forEach(function(p){
        var pl=p.platform||'Other';
        if(!platforms[pl]) platforms[pl]={posts:[],total:0};
        platforms[pl].posts.push(p);
        platforms[pl].total++;
      });
      Object.keys(platforms).forEach(function(pl){
        var grp=platforms[pl];
        html+='<div class="card" style="padding:20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font-size:14px;font-weight:600">'+pl+'</span><span class="badge" style="'+statusBadge('active')+'">'+grp.total+' posts</span></div>';
        grp.posts.slice(0,3).forEach(function(p){
          html+='<div style="font-size:12px;color:rgba(255,255,255,.6);padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03)">'+(p.content||p.title||'Post').substring(0,60)+(p.date?' <span style="color:var(--muted)">&middot; '+p.date+'</span>':'')+'</div>';
        });
        html+='</div>';
      });
      html+='</div>';
    } else {
      html+='<div class="empty-msg">No social posts yet. Click "Create Post" to schedule your first post.</div>';
    }
    el.innerHTML=html;
  }catch(e){
    el.innerHTML='<h2>Social Media Command</h2><div class="error-msg">Unable to load social data. Please try again later.</div>';
  }
};

// ANALYTICS
loaders.analytics=async function(){
  var el=document.getElementById('p-analytics');
  try{
    var data=await apiFetch('analytics');
    var days=data.days||[];
    var html='<h2>Analytics</h2>';
    // Bar chart
    html+='<div class="card"><div class="card-title">Traffic (Last 14 Days)</div>';
    if(days.length){
      var mx=Math.max.apply(null,days.map(function(d){return d.views||0}));
      var totalViews=days.reduce(function(s,d){return s+(d.views||0)},0);
      var totalLeads=days.reduce(function(s,d){return s+(d.leads||0)},0);
      html+='<div style="display:flex;align-items:flex-end;gap:6px;height:160px;margin-bottom:12px">';
      days.forEach(function(d){
        var h=mx>0?Math.round((d.views||0)/mx*140):4;
        var lbl=(d.date||'').slice(-5);
        html+='<div style="flex:1;text-align:center" title="'+lbl+': '+(d.views||0)+' views"><div style="height:'+h+'px;background:linear-gradient(180deg,rgba(201,168,76,.8),rgba(201,168,76,.2));border-radius:4px 4px 0 0;min-height:4px"></div><div style="font-size:9px;color:var(--muted);margin-top:4px">'+lbl+'</div></div>';
      });
      html+='</div>';
      html+='</div>';
      // Summary stats
      html+='<div class="grid3">';
      html+='<div class="stat"><div class="stat-label">Total Page Views</div><div class="stat-val" style="color:var(--gold)">'+totalViews.toLocaleString()+'</div><div class="stat-sub" style="color:var(--green)">last '+days.length+' days</div></div>';
      html+='<div class="stat"><div class="stat-label">Leads from Content</div><div class="stat-val" style="color:var(--green)">'+totalLeads+'</div><div class="stat-sub">conversions</div></div>';
      html+='<div class="stat"><div class="stat-label">Avg Daily Views</div><div class="stat-val" style="color:var(--purple)">'+Math.round(totalViews/days.length)+'</div><div class="stat-sub">per day</div></div>';
      html+='</div>';
    } else {
      html+='<div style="color:var(--muted);font-size:13px;padding:20px;text-align:center">Analytics data will populate as your content generates traffic.</div></div>';
    }
    el.innerHTML=html;
  }catch(e){
    el.innerHTML='<h2>Analytics</h2><div class="error-msg">Unable to load analytics. Please try again later.</div>';
  }
};

// VOICE AI
loaders.voice=async function(){
  var el=document.getElementById('p-voice');
  try{
    var data=await apiFetch('voice');
    var convos=data.conversations||[];
    var html='<h2 style="margin-bottom:6px">Voice AI Agents</h2>';
    html+='<p style="font-size:13px;color:var(--muted);margin-bottom:18px">Your 24/7 phone team &middot; (631) 892-9817</p>';
    html+='<div style="display:flex;gap:12px;margin-bottom:24px"><a href="tel:+16318929817" class="btn" style="text-decoration:none;display:inline-flex;align-items:center;gap:8px">&#9742; Call Now</a><button class="btn btn-outline" onclick="loaded.voice=false;loaders.voice()">Refresh</button></div>';
    // Emma agent card
    html+='<div class="card" style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:15px;font-weight:600">Emma &mdash; AI Receptionist</span><span class="badge" style="background:rgba(34,197,94,.1);color:var(--green)">Active</span></div>';
    html+='<div style="font-size:13px;color:var(--muted);margin-bottom:6px">Phone: (631) 892-9817 &middot; Available 24/7</div>';
    html+='<div style="font-size:13px;color:rgba(255,255,255,.5)">'+convos.length+' conversation'+(convos.length===1?'':'s')+' recorded</div></div>';
    // Conversation log
    html+='<div class="card"><div class="card-title">Conversation Log</div>';
    if(convos.length){
      convos.forEach(function(c){

  }
};

// LEADS
loaders.leads=async function(){
  var el=document.getElementById('p-leads');
  try{
    var data=await apiFetch('leads');
    var leads=data.leads||[];
    var html='<h2>Lead Pipeline</h2>';
    if(leads.length){
      html+='<div class="card" style="padding:0;overflow:hidden">';
      html+='<div class="tbl-header" style="grid-template-columns:2fr 2fr 1fr 1fr 1.5fr"><div>Name</div><div>Company</div><div>Status</div><div>Score</div><div>Source</div></div>';
      leads.forEach(function(l){
        var scoreColor=(l.score||0)>=80?'var(--green)':(l.score||0)>=60?'var(--gold)':'var(--muted)';
        html+='<div class="tbl-row" style="grid-template-columns:2fr 2fr 1fr 1fr 1.5fr"><div style="font-weight:500">'+(l.name||'Unknown')+'</div><div style="color:var(--muted)">'+(l.company||'-')+'</div><span class="badge" style="'+statusBadge(l.status)+';width:fit-content">'+(l.status||'New')+'</span><div style="font-weight:600;color:'+scoreColor+'">'+(l.score||'-')+'</div><div style="font-size:12px;color:var(--muted)">'+(l.source||'-')+'</div></div>';
      });
      html+='</div>';
    } else {
      html+='<div class="empty-msg">No leads captured yet &mdash; leads will appear here as your content generates traffic.</div>';
    }
    el.innerHTML=html;
  }catch(e){
    el.innerHTML='<h2>Lead Pipeline</h2><div class="error-msg">Unable to load leads. Please try again later.</div>';
  }
};

// ========== MODAL ACTIONS ==========

function openNewContentModal(){
  openModal('<h3>Request New Content</h3><label>Content Type</label><select id="nc-type"><option>Blog Post</option><option>Social Post</option><option>Newsletter</option><option>Image</option></select><label>Title / Topic</label><input type="text" id="nc-title" placeholder="e.g. 5 Ways AI is Changing Marketing"><label>Platform (optional)</label><select id="nc-platform"><option value="">Any</option><option>Website</option><option>LinkedIn</option><option>Twitter/X</option><option>Instagram</option><option>Facebook</option><option>Email</option></select><button class="btn" onclick="submitNewContent()">Submit Request</button>');
}

async function submitNewContent(){
  var type=document.getElementById('nc-type').value;
  var title=document.getElementById('nc-title').value;
  var platform=document.getElementById('nc-platform').value;
  if(!title){alert('Please enter a title or topic.');return;}
  try{
    await fetch(API+'?action=content',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({type:type,title:title,platform:platform})});
  }catch(e){}
  showModalSuccess('Content request submitted! Our AI team will deliver within 48 hours.');
  loaded.content=false;
}

function openCreatePostModal(){
  openModal('<h3>Create Social Post</h3><label>Platform</label><select id="sp-platform"><option>LinkedIn</option><option>Twitter/X</option><option>Instagram</option><option>Facebook</option><option>TikTok</option><option>Pinterest</option></select><label>Content</label><textarea id="sp-content" rows="5" placeholder="Write your post content..."></textarea><button class="btn" onclick="submitSocialPost()">Schedule Post</button>');
}

async function submitSocialPost(){
  var platform=document.getElementById('sp-platform').value;
  var content=document.getElementById('sp-content').value;
  if(!content){alert('Please write some content.');return;}
  try{
    await fetch(API+'?action=social',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({platform:platform,content:content})});
  }catch(e){}
  showModalSuccess('Post scheduled! It will be published by our social engine.');
  loaded.social=false;
}

function openMediaModal(idx){
  var a=window._mediaActions[idx];
  var html='<h3>'+a.name+'</h3>';
  a.fields.forEach(function(f){
    html+='<label>'+f.l+'</label>';
    if(f.t==='textarea') html+='<textarea id="mf-'+f.n+'" rows="3" placeholder=""></textarea>';
    else if(f.t==='select'){
      html+='<select id="mf-'+f.n+'">';
      f.opts.forEach(function(o){html+='<option>'+o+'</option>';});
      html+='</select>';
    } else html+='<input type="'+f.t+'" id="mf-'+f.n+'" placeholder="">';
  });
  html+='<button class="btn" onclick="submitMediaRequest(\''+a.name+'\')">Submit Request</button>';
  openModal(html);
}

function submitMediaRequest(name){
  showModalSuccess('Request submitted &mdash; our AI team will deliver your '+name.toLowerCase()+' within 48 hours.');
}

// ========== SETTINGS ACTIONS ==========

function saveAccountInfo(){
  var newName=document.getElementById('set-name').value;
  var newEmail=document.getElementById('set-email').value;
  u.name=newName;u.email=newEmail;
  localStorage.setItem('pf_user',JSON.stringify(u));
  document.getElementById('sb-name').textContent=newName.split(/[._]/).map(function(w){return w.charAt(0).toUpperCase()+w.slice(1)}).join(' ');
  document.getElementById('sb-email').textContent=newEmail.slice(0,22);
  alert('Account info saved.');
}

function saveBrandVoice(){
  localStorage.setItem('pf_brand_voice',document.getElementById('set-voice').value);
  alert('Brand voice saved.');
}

function saveNotifs(){
  var notifs={
    email:document.getElementById('notif-email').checked,
    push:document.getElementById('notif-push').checked,
    weekly:document.getElementById('notif-weekly').checked,
    content:document.getElementById('notif-content').checked
  };
  localStorage.setItem('pf_notifs',JSON.stringify(notifs));
}

loaded.dash=true;loaders.dash();
loaded.media=true;loaders.media();
loaded.settings=true;loaders.settings();
