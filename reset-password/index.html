<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,#0a0a0f 0%,#141420 50%,#0d1117 100%);display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;padding:20px}
.card{width:100%;max-width:420px;position:relative}
.inner{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:24px;padding:48px 36px;backdrop-filter:blur(20px)}
.logo{font-family:'Instrument Serif',serif;font-size:28px;color:#f7f5f0;text-align:center;margin-bottom:4px}
.logo span{color:#c9a84c}
.sub{font-size:13px;color:rgba(255,255,255,.35);text-align:center;letter-spacing:.08em;text-transform:uppercase;font-weight:500;margin-bottom:36px}
label{display:block;font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;font-weight:600}
input{width:100%;padding:14px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:#f7f5f0;font-size:15px;outline:none;font-family:inherit;margin-bottom:20px;transition:border .2s}
input:focus{border-color:rgba(201,168,76,.4)}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,#c9a84c,#b8963f);border:none;border-radius:12px;color:#0a0a0f;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.02em;transition:all .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,.25)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.msg{font-size:13px;text-align:center;margin-bottom:16px;display:none;padding:12px;border-radius:8px}
.msg.error{display:block;color:#ef4444;background:rgba(239,68,68,.1)}
.msg.success{display:block;color:#22c55e;background:rgba(34,197,94,.1)}
.links{text-align:center;margin-top:20px;font-size:13px;color:rgba(255,255,255,.3)}
.links a{color:rgba(201,168,76,.7);text-decoration:none}
.step{display:none}.step.active{display:block}
</style>

<body>
<div class="card">
<div class="inner">
<div class="logo">Pro<span>Flow</span></div>
<div class="sub">Reset Password</div>
<div id="msg" class="msg"></div>

<div id="step1" class="step active">
<label>Email Address</label>
<input type="email" id="email" placeholder="you@company.com">
<button class="btn" onclick="requestReset()">Send Reset Code</button>
</div>

<div id="step2" class="step">
<label>6-Digit Code</label>
<input type="text" id="code" placeholder="123456" maxlength="6" pattern="[0-9]{6}">
<label>New Password</label>
<input type="password" id="newpass" placeholder="Minimum 8 characters">
<label>Confirm Password</label>
<input type="password" id="confirm" placeholder="Confirm new password">
<button class="btn" onclick="resetPassword()">Reset Password</button>
</div>

<div class="links">
<a href="/login/">Back to Login</a> · <a href="/">Home</a>
</div>
</div>
</div>

<script>
var msgEl=document.getElementById('msg');
function showMsg(text,type){msgEl.textContent=text;msgEl.className='msg '+type;}

async function requestReset(){
  var email=document.getElementById('email').value.trim();
  if(!email){showMsg('Please enter your email','error');return;}
  try{
    var res=await fetch('/api/reset-password',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'request',email:email})
    });
    var data=await res.json();
    if(res.ok){
      showMsg('If that email is registered, a reset code has been sent. Check your email or function logs.','success');
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');
    } else {
      showMsg(data.error||'Something went wrong','error');
    }
  }catch(e){showMsg('Connection error','error');}
}

async function resetPassword(){
  var email=document.getElementById('email').value.trim();
  var code=document.getElementById('code').value.trim();
  var newpass=document.getElementById('newpass').value;
  var confirm=document.getElementById('confirm').value;
  if(newpass!==confirm){showMsg('Passwords do not match','error');return;}
  if(newpass.length<8){showMsg('Password must be at least 8 characters','error');return;}
  try{
    var res=await fetch('/api/reset-password',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'reset',email:email,code:code,newPassword:newpass})
    });
    var data=await res.json();
    if(res.ok&&data.token){
      showMsg('Password reset successful! Redirecting...','success');
      localStorage.setItem('pf_token',data.token);
      localStorage.setItem('pf_user',JSON.stringify({email:data.email,plan:'agency',role:'chairman'}));
      setTimeout(function(){window.location.href='/portal/';},2000);
    } else {
      showMsg(data.error||'Reset failed','error');
    }
  }catch(e){showMsg('Connection error','error');}
}
</script>

<script>
// Sticky CTA — show after 30% scroll
(function(){
  if(sessionStorage.getItem('cta_closed'))return;
  var shown=false;
  window.addEventListener('scroll',function(){
    if(shown)return;
    var pct=window.scrollY/(document.body.scrollHeight-window.innerHeight);
    if(pct>0.3){
      document.getElementById('sticky-cta').style.transform='translateY(0)';
      shown=true;
    }
  });
})();

// Exit intent — show when mouse leaves viewport (desktop only)
(function(){
  if(sessionStorage.getItem('exit_shown'))return;
  if('ontouchstart' in window)return; // skip mobile
  document.addEventListener('mouseout',function(e){
    if(!e.relatedTarget && !e.toElement && e.clientY<10){
      document.getElementById('exit-popup').style.display='flex';
      sessionStorage.setItem('exit_shown','1');
    }
  });
})();

// Lead capture
function captureExitLead(){
  var email=document.getElementById('exit-email').value;
  if(!email||!email.includes('@'))return;
  fetch('/.netlify/functions/lead-capture',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email,source:'exit_intent',page:location.pathname})}).catch(function(){});
  fetch('/.netlify/functions/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email,source:'exit_popup'})}).catch(function(){});
  localStorage.setItem('pf_lead',email);
  document.getElementById('exit-popup').innerHTML='<div style="background:#fff;border-radius:8px;padding:48px;text-align:center"><h3 style="font-family:Playfair Display,serif;font-size:24px;color:#16793a">Check your inbox!</h3><p style="font-family:DM Sans,sans-serif;font-size:15px;color:#6b6b6b;margin-top:8px">Your free guide is on its way.</p></div>';
  setTimeout(function(){document.getElementById('exit-popup').style.display='none'},3000);
}

// Auto-inject inline CTAs into blog posts (every 3rd section)
(function(){
  var article=document.querySelector('article');
  if(!article)return;
  var h2s=article.querySelectorAll('h2');
  var tpl=document.getElementById('inline-cta-template');
  var phoneTpl=document.getElementById('phone-cta-template');
  if(h2s.length>2 && tpl){
    var cta=tpl.content.cloneNode(true);
    h2s[Math.floor(h2s.length/2)].parentNode.insertBefore(cta,h2s[Math.floor(h2s.length/2)]);
  }
  if(h2s.length>4 && phoneTpl){
    var phone=phoneTpl.content.cloneNode(true);
    h2s[h2s.length-1].parentNode.insertBefore(phone,h2s[h2s.length-1]);
  }
})();

// Track page views for analytics
(function(){
  fetch('/.netlify/functions/track',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({event:'pageview',page:location.pathname,ref:document.referrer,ts:Date.now()})}).catch(function(){});
})();
</script>
